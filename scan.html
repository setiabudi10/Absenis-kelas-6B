<!DOCTYPE html>

<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Scan QR - Absensi 6B SDN Jawilan</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{

  font-family: Arial;

  background:#f4fff4;

  text-align:center;

  padding:20px;

}

.box{

  background:white;

  padding:20px;

  border-radius:15px;

  max-width:400px;

  margin:auto;

  box-shadow:0 3px 10px #ccc;

}

h1{

 color:#198754;

}

#reader{

 width:100%;

}

#hasil{

 margin-top:20px;

 font-size:18px;

 font-weight:bold;

 color:#198754;

}

</style>

</head>

<body>

<div class="box">

<h1>SCAN QR</h1>

<h3>ABSENSI QR KELAS 6B</h3>

<div id="reader"></div>

<div id="hasil">

Silakan scan QR siswa

</div>

</div>

<script>

function berhasilScan(teks){

 document.getElementById("hasil").innerHTML =

 "Siswa terdeteksi:<br>"+teks;

}

let scanner = new Html5QrcodeScanner(

"reader",

{

 fps:10,

 qrbox:250

}

);

scanner.render(

berhasilScan

);

</script>

</body>

</html>
